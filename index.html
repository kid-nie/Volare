<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volare</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  background: transparent;
  font-family: 'Segoe UI', Arial, sans-serif;
  color: #333;
}

.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: linear-gradient(to bottom, #87CEEB, #ffffff),
              url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1920')
              center/cover no-repeat;
  background-blend-mode: overlay;
  z-index: -1;
}

.title {
  text-align: center;
  margin-top: 45px;
}

.title h1 {
  margin: 0;
  font-size: 2.5rem;
  color: #1f3b57;
}

.container {
  width: 90%;
  max-width: 800px;
  margin: auto;
  text-align: center;
  padding-bottom: 100px;
}

.search-box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.field label {
  display: block;
  margin-bottom: 6px;
  font-weight: bold;
  font-size: 0.9rem;
}

input {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
  width: 160px;
}

button {
  margin-top: 10px;
  padding: 12px 30px;
  border-radius: 8px;
  border: 2px solid #8B0B0B;
  background: transparent;
  color: #8B0B0B;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #8B0B0B;
  color: white;
}

/* ✨ CARD DESIGN */
.card {
  background: white;
  margin: 20px auto;
  padding: 20px;
  border-radius: 16px;
  width: 85%;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  border-left: 5px solid #8B0B0B;
  position: relative;
}

/* top row */
.top-row {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

/* middle route */
.route {
  text-align: center;
  font-size: 1.3rem;
  margin: 15px 0;
}

/* airline + duration */
.details {
  display: flex;
  justify-content: space-between;
  font-size: 0.9rem;
  color: #555;
}

/* book button */
.book-btn {
  margin-top: 15px;
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #8B0B0B;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.book-btn:hover {
  opacity: 0.9;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="title">
  <h1>Volare ✈️</h1>
</div>

<div class="container">

<div class="search-box">

  <div class="field">
    <label>Departure</label>
    <input id="departure" placeholder="DXB">
  </div>

  <div class="field">
    <label>Arrival</label>
    <input id="arrival" placeholder="BLR">
  </div>

  <div class="field">
    <label>Departure Date</label>
    <input id="outbound" type="date">
  </div>

  <div class="field">
    <label>Return Date</label>
    <input id="return" type="date">
  </div>

  <button onclick="searchFlights()">Search Flights</button>

</div>

<div id="results"></div>

</div>

<script>
async function searchFlights() {

  const dep = document.getElementById("departure").value.trim();
  const arr = document.getElementById("arrival").value.trim();
  const out = document.getElementById("outbound").value;

  const resultsDiv = document.getElementById("results");

  if (!dep || !arr || !out) {
    resultsDiv.innerHTML = `<div class="card">⚠️ Fill all required fields</div>`;
    return;
  }

  resultsDiv.innerHTML = "<p>Searching flights... ✈️</p>";

  try {
    const res = await fetch(`/api/search?departure=${dep}&arrival=${arr}&outbound=${out}`);
    const data = await res.json();
    const flights = data.best_flights || data.other_flights || data.flights || [];

    if (!flights.length) {
      resultsDiv.innerHTML = "<div class='card'>No flights found 😢</div>";
      return;
    }

    resultsDiv.innerHTML = "";

    flights.forEach(flight => {

      const f = flight.flights?.[0];
      if (!f) return;

      const price = flight.price || "N/A";
      const airline = f.airline || "Unknown";
      const duration = flight.total_duration || "N/A";

      /* 🔗 GOOGLE FLIGHTS LINK */
      const googleLink = `https://www.google.com/travel/flights?q=Flights%20from%20${dep}%20to%20${arr}%20on%20${out}`;

      resultsDiv.innerHTML += `
        <div class="card">

          <div class="top-row">
            <div>💰 ${price}</div>
            <div>${airline}</div>
          </div>

          <div class="route">
            ${dep} → ${arr}
          </div>

          <div class="details">
            <div>⏱ ${duration} mins</div>
            <div>Direct</div>
          </div>

          <button class="book-btn" onclick="window.open('${googleLink}', '_blank')">
            Book This ✈️
          </button>

        </div>
      `;
    });

  } catch (err) {
    resultsDiv.innerHTML = `<div class="card">⚠️ Error fetching flights</div>`;
  }
}
</script>
