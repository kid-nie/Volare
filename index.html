<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Volare</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #333;
    }
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to bottom, #87CEEB, #ffffff),
                  url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1920')
                  center/cover no-repeat;
      background-blend-mode: overlay;
      z-index: -1;
    }
    .title {
      text-align: center;
      margin-top: 45px;
      margin-bottom: 10px;
    }

    .title h1 {
      margin: 0;
      font-size: 2.5rem;
      color: #1f3b57;
    }

    .title p {
      margin-top: 6px;
      color: #4b6b88;
      font-size: 1rem;
    }

    .container {
      width: 90%;
      max-width: 800px;
      margin: auto;
      text-align: center;
      padding-bottom: 100px;
    }
    .search-box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }

    .field {
      text-align: left;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 0.9rem;
      color: #555;
    }

    input {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      width: 160px;
      outline: none;
    }

    input:focus {
      border-color: #8B0B0B;
    }

    button {
      margin-top: 10px;
      padding: 12px 30px;
      border-radius: 8px;
      border: 2px solid #8B0B0B;
      background: transparent;
      color: #8B0B0B;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #8B0B0B;
      color: white;
    }

    .card {
      background: white;
      margin: 20px auto;
      padding: 25px;
      border-radius: 16px;
      width: 80%;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      text-align: left;
      border-left: 5px solid #8B0B0B;
    }

    .airia-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #8B0B0B;
      color: white;
      padding: 14px 18px;
      border-radius: 50px;
      font-weight: bold;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>
<div class="bg"></div>

<div class="title">
  <h1>Volare ✈️</h1>
  <p>Flying made easy</p>
</div>

<div class="container">

  <div class="search-box">

    <div class="field">
      <label>Departure</label>
      <input id="departure" placeholder="DXB">
    </div>

    <div class="field">
      <label>Arrival</label>
      <input id="arrival" placeholder="BLR">
    </div>

    <div class="field">
      <label>Departure Date</label>
      <input id="outbound" type="date">
    </div>

    <div class="field">
      <label>Return Date</label>
      <input id="return" type="date">
    </div>

    <button onclick="searchFlights()">Search Flights</button>

  </div>

  <div id="results"></div>
</div>

<script type="module">
import AiriaChat from "https://embed-api.airia.ai/get-chat-embed.js"

AiriaChat.init({
  pipelineId: "9c61dd1d-0ef0-4a6b-9ea0-7cc4b0b20fe8",
  apiKey: "ak-MjQzNzg2OTUyM3wxNzc2OTY1NTAzOTY0fHRpLVpHVmpiMlJwYm1jZ1pHRjBZU0J6WTJsbGJtTmxMVTl3Wlc0Z1VtVm5hWE4wY21GMGFXOXVMVkJ5YjJabGMzTnBiMjVoYkY5aVpXVXdZbUl3T0MweE9USTNMVFF4TVdRdFlqSTVPUzB4WkRSak5HTTRaVFUwWWpRPXwxfDE0MjA5NzMzMDAg",
  apiUrl: "https://embed-api.airia.ai",
  greeting: "Hi, Welcome to Volare where flying is made easy. How may i help you today?",
  imagePath: "https://cdn-icons-png.flaticon.com/512/4712/4712035.png",
  imageSize: "small",
  imageBgColor: "#FFFFFF",
  autoOpen: true
})
</script>

<script>
async function searchFlights() {

  const dep = document.getElementById("departure").value.trim();
  const arr = document.getElementById("arrival").value.trim();
  const out = document.getElementById("outbound").value;
  const ret = document.getElementById("return").value;

  const resultsDiv = document.getElementById("results");

  /* 🚨 INPUT CHECK */
  if (!dep || !arr || !out) {
    resultsDiv.innerHTML = `
      <div class="card">
        ⚠️ Please fill in Departure, Arrival, and Date
      </div>
    `;
    return;
  }

  resultsDiv.innerHTML = "<p>Searching flights... ✈️</p>";

  try {
    const res = await fetch(
      `/api/search?departure=${dep}&arrival=${arr}&outbound=${out}&return=${ret}`
    );

    const data = await res.json();
    const flights = data.best_flights || data.other_flights || [];

    if (!flights.length) {
      resultsDiv.innerHTML = "<div class='card'>No flights found 😢</div>";
      return;
    }

    resultsDiv.innerHTML = "";

    flights.forEach(flight => {
      const f = flight.flights?.[0];
      if (!f) return;

      resultsDiv.innerHTML += `
        <div class="card">
          <h2>${f.airline}</h2>
          <p>💰 ${flight.price || "N/A"}</p>
          <p>⏱ ${flight.total_duration || "N/A"} mins</p>
        </div>
      `;
    });

  } catch (err) {
    resultsDiv.innerHTML = `
      <div class="card">⚠️ Error fetching flights</div>
    `;
  }
}
</script>

</body>
</html>
